name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Lint
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check ."

      - name: Format
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "format . --check"