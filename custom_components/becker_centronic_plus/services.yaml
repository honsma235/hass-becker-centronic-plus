set_preset:
  name: Set preset
  description: Saves the current position of the cover as a preset.
  target:
    entity:
      domain: cover
      integration: becker_centronic_plus
  fields:
    preset:
      name: Preset
      description: The preset number to save (1 or 2).
      required: true
      selector:
        select:
          options:
            - "1"
            - "2"
delete_preset:
  name: Delete preset
  description: Deletes both saved preset positions.
  target:
    entity:
      domain: cover
      integration: becker_centronic_plus
